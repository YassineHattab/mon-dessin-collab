<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CollabDraw Socket.io - PC & Mobile</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; }
        body { font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #f1f5f9; }
        header { background: var(--dark); color: white; padding: 15px; text-align: center; font-weight: bold; }
        .toolbar { display: flex; justify-content: center; gap: 15px; padding: 10px; background: white; border-bottom: 1px solid #ddd; }
        #canvas-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; padding: 10px; }
        canvas { background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); touch-action: none; }
        button { padding: 8px 15px; border-radius: 5px; border: none; background: var(--primary); color: white; cursor: pointer; }
        .btn-clear { background: #ef4444; }
        #status { font-size: 0.8rem; margin-top: 5px; color: #10b981; }
    </style>
</head>
<body>

<header>
    CollabDraw Temps Réel
    <div id="status">Connexion au serveur...</div>
</header>

<div class="toolbar">
    <input type="color" id="colorPicker" value="#2563eb">
    <input type="range" id="lineWidth" min="1" max="20" value="5">
    <button class="btn-clear" onclick="clearCanvas()">Effacer tout</button>
</div>

<div id="canvas-container">
    <canvas id="paintCanvas"></canvas>
</div>

<script>
    // 1. CONNEXION AU SERVEUR (REMPLACEZ L'URL CI-DESSOUS)
    const socket = io('https://mon-dessin-serveur.onrender.com'); 
    
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    let drawing = false;

    socket.on('connect', () => { status.innerText = "Connecté au serveur en direct ✅"; });

    function init() {
        canvas.width = window.innerWidth * 0.95;
        canvas.height = window.innerHeight * 0.7;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    // --- LOGIQUE DE DESSIN ---
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDrawing(e) {
        drawing = true;
        const pos = getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
        if (e.type === 'touchstart') e.preventDefault();
    }

    function draw(e) {
        if (!drawing) return;
        if (e.type === 'touchmove') e.preventDefault();

        const pos = getPos(e);
        const color = document.getElementById('colorPicker').value;
        const width = document.getElementById('lineWidth').value;

        // On dessine localement
        renderStroke(pos.x, pos.y, color, width);

        // On envoie au serveur pour les autres
        socket.emit('drawing', { x: pos.x, y: pos.y, color, width });
    }

    function renderStroke(x, y, color, width) {
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    // --- RÉCEPTION DES DONNÉES ---
    socket.on('drawing', (data) => {
        renderStroke(data.x, data.y, data.color, data.width);
    });

    socket.on('clear', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    function clearCanvas() {
        if(confirm("Effacer pour tout le monde ?")) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            socket.emit('clear');
        }
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });

    canvas.addEventListener('touchstart', startDrawing, {passive: false});
    canvas.addEventListener('touchmove', draw, {passive: false});
    canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });

    window.addEventListener('resize', init);
    init();
</script>
</body>
</html>
